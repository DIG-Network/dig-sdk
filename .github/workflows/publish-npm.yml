name: publish-npm

# Build the SDK (ESM + CJS + d.ts) and publish @dignetwork/dig-sdk to npmjs. Auth uses the
# org-level NPM_TOKEN secret (must be granted to this repo in the org secret's repository-access
# list) — the SAME pattern as chip35_dl_coin's publish-npm.yml. Runs when a GitHub Release is
# published (tag-driven), or on manual dispatch. The package version published is whatever is in
# package.json on the released commit — bump it before tagging.
on:
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: build + test + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Gate the publish on a green build + tests (build also runs via prepublishOnly).
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:examples
      - run: npm test
      - name: publish to npmjs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
