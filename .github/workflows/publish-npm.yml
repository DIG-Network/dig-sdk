name: publish-npm

# Build the SDK (ESM + CJS + d.ts) and publish @dignetwork/dig-sdk to npmjs. Auth uses npm
# Trusted Publishing (OIDC) — no NPM_TOKEN secret; npm exchanges this workflow run's GitHub OIDC
# token for a short-lived publish token, provided the npm-side trusted publisher is configured for
# org DIG-Network, repo dig-sdk, workflow publish-npm.yml. Runs when a GitHub Release is
# published (tag-driven), or on manual dispatch. The package version published is whatever is in
# package.json on the released commit — bump it before tagging.
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + test + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Gate the publish on a green build + tests (build also runs via prepublishOnly).
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:examples
      - run: npm test
      # Trusted publishing requires npm CLI >= 11.5.1; Node 22 bundles npm 10.
      - name: upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: publish to npmjs
        run: npm publish --access public
