name: ci

# Build + typecheck + test on every push and PR. Also typechecks the README examples against the
# freshly built type declarations so the docs can never drift from the public API.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: typecheck (source)
        run: npm run typecheck
      - name: build (ESM + CJS + d.ts)
        run: npm run build
      - name: typecheck README examples against built types
        run: npm run test:examples
      - name: unit + integration tests with coverage (node --test under c8, ≥80% gate)
        run: npm run coverage
